# YOLOv8 dual-stream with CPNet (CAM + RCM)
ch: 6
nc: 80 
scales:
  n: [0.33, 0.25, 1024] 

# --- Backbone (RGB 0-9, SAR 10-19) 保持不变 ---
backbone:
  - [-1, 1, Conv, [64, 3, 2]]   # 0-P1
  - [-1, 1, Conv, [128, 3, 2]]  # 1-P2
  - [-1, 3, C2f, [128, True]]   # 2-RGB P2
  - [-1, 1, Conv, [256, 3, 2]]  # 3-P3
  - [-1, 6, C2f, [256, True]]   # 4-RGB P3
  - [-1, 1, Conv, [512, 3, 2]]  # 5-P4
  - [-1, 6, C2f, [512, True]]   # 6-RGB P4
  - [-1, 1, Conv, [1024, 3, 2]] # 7-P5
  - [-1, 3, C2f, [1024, True]]  # 8
  - [-1, 1, SPPF, [1024, 5]]    # 9-RGB P5

  - [-10, 1, Conv, [64, 3, 2]]  # 10-SAR P1
  - [-1, 1, Conv, [128, 3, 2]]  # 11-SAR P2
  - [-1, 3, C2f, [128, True]]   # 12-SAR P2
  - [-1, 1, Conv, [256, 3, 2]]  # 13-SAR P3
  - [-1, 6, C2f, [256, True]]   # 14-SAR P3
  - [-1, 1, Conv, [512, 3, 2]]  # 15-SAR P4
  - [-1, 6, C2f, [512, True]]   # 16-SAR P4
  - [-1, 1, Conv, [1024, 3, 2]] # 17-SAR P5
  - [-1, 3, C2f, [1024, True]]  # 18
  - [-1, 1, SPPF, [1024, 5]]    # 19-SAR P5

# --- CPNet CAM Fusion (层索引 20-22) ---
  - [[9, 19, 9, 19], 1, CAM, []] # 20: F_P5 (尺度 1x)
  - [[6, 16, 9, 19], 1, CAM, []] # 21: F_P4 (尺度 2x)
  - [[4, 14, 6, 16], 1, CAM, []] # 22: F_P3 (尺度 4x)

# ... Backbone 和 CAM 部分保持不变 (层索引 0-22) ...

# --- CPNet Progressive Decoder (渐进式解码器) ---
head:
  # 1. P5 -> P4 融合 
  - [20, 1, nn.Upsample, [None, 2, "nearest"]] # 23: Up(F_P5) -> 变为 P4 尺度
  - [[-1, 21], 1, Concat, [1]]                 # 24: Cat(Up5, F_P4) [此时尺寸对齐]
  - [-1, 1, Conv, [512, 1, 1]]                 # 25: 降维
  - [-1, 1, RCM, []]                           # 26: 精炼后的 P4 特征 (对应论文 RCM3)

  # 2. P4 -> P3 融合 
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 27: Up(RCM3) -> 变为 P3 尺度
  - [[-1, 22], 1, Concat, [1]]                 # 28: Cat(Up4, F_P3) [此时尺寸对齐]
  - [-1, 1, Conv, [256, 1, 1]]                 # 29: 降维
  - [-1, 1, RCM, []]                           # 30: 精炼后的 P3 特征 (对应论文 RCM2)-> 检测头 P3

  # 3. 构建 PAN 聚合路径 (Bottom-Up)
  - [-1, 1, Conv, [256, 3, 2]]                 # 31: 下采样回 P4 尺度
  - [[-1, 26], 1, Concat, [1]]                 # 32: 结合精炼后的 P4 信息
  - [-1, 3, C2f, [512]]                        # 33 -> 检测头 P4

  - [-1, 1, Conv, [512, 3, 2]]                 # 34: 下采样回 P5 尺度
  - [[-1, 20], 1, Concat, [1]]                 # 35: 结合原始融合 P5 信息
  - [-1, 3, C2f, [1024]]                       # 36 -> 检测头 P5

  - [[30, 33, 36], 1, Detect, [nc]]            # 37: 多尺度检测